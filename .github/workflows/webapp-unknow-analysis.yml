name: Build and deploy container to Web App - unknow-analysis

on:
  push:
    branches:
      - main
    paths:
      - 'node/**'
      - 'Dockerfile'
      - '.github/workflows/webapp-unknow-analysis.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: unknow-analysis
  IMAGE_BASE: ghcr.io/shinguakira/unknown-access-analyze

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.out.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:${{ github.sha }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: out
        run: echo "image=${{ env.IMAGE_BASE }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login (OIDC, federated)
        uses: azure/login@v2
        with:
          # OIDC managed identity Portal provisioned for unknow-analysis.
          # Website Contributor on /subscriptions/.../resourceGroups/test/providers/Microsoft.Web/sites/unknow-analysis.
          client-id: 363a18ed-6d7b-467a-87c1-2e37b8599ac6
          tenant-id: 73e316fc-8256-4d93-baff-caa19e4fdaa6
          subscription-id: ffa50068-ad32-44b8-845f-737a9b9ee909

      - name: Deploy container image to Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ needs.build-and-push.outputs.image }}
