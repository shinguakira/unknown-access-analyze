name: Build and deploy Node TS to Azure Functions - unknown-analysis

on:
  push:
    branches:
      - main
    paths:
      - 'node/**'
      - '.github/workflows/main_unknown-analysis.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: unknown-analysis
  AZURE_FUNCTIONAPP_PACKAGE_PATH: node
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC federated login
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install + build (TypeScript)
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: |
          npm ci || npm install
          npm run build
          npm prune --omit=dev

      - name: Azure login (OIDC, federated)
        uses: azure/login@v2
        with:
          # Not secrets — discoverable identifiers. Security comes from the
          # federated credential restricting which repo+branch can request
          # a token for this managed identity.
          client-id: 4307a314-c25b-4087-bd35-c61e4bff4641
          tenant-id: 73e316fc-8256-4d93-baff-caa19e4fdaa6
          subscription-id: ffa50068-ad32-44b8-845f-737a9b9ee909

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
