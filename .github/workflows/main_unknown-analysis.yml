name: Build and deploy Node TS to Azure Functions - unknown-analysis

on:
  push:
    branches:
      - main
    paths:
      - 'node/**'
      - '.github/workflows/main_unknown-analysis.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: unknown-analysis
  AZURE_FUNCTIONAPP_PACKAGE_PATH: node
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install + build (TypeScript)
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: |
          npm ci || npm install
          npm run build
          npm prune --omit=dev

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
